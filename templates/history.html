<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История — ИИ-ассистент для моделистов</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div id="toastContainer" class="toast-container"></div>
        <div class="header"><div></div><div id="authButtons" class="auth-buttons"><button class="auth-btn" onclick="showAuthModal()">Войти</button><button class="auth-btn" onclick="showRegisterModal()">Регистрация</button></div><div id="userInfo" style="display:none;"></div></div>
        <h1>📜 История распознаваний</h1><div class="subtitle">Статистика и история ваших распознаваний</div>
        <div class="nav"><a href="/">🔍 Распознавание</a><a href="/collection">📦 Коллекция</a><a href="/gallery">🎨 Галерея</a><a href="/history" class="active">📜 История</a><a href="/guide">📚 Справочник</a><a href="/about">ℹ️ О проекте</a><a href="#" id="profileNavLink" style="display:none;">👤 Профиль</a></div>
        <div id="historyContent"></div>
    </div>
    <div id="authModal" class="auth-modal"><div class="auth-form"><button class="modal-close-btn" onclick="closeAuthModal()" type="button">✕</button><h3>Вход в аккаунт</h3><input type="text" id="loginUsername" placeholder="Имя пользователя"><div class="password-container"><input type="password" id="loginPassword" placeholder="Пароль"><button type="button" class="toggle-password" data-target="loginPassword">👁️</button></div><div style="display:flex;justify-content:space-between;align-items:center;margin:10px 0;"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:#ccc;"><input type="checkbox" id="rememberMe"> Запомнить меня</label></div><button class="auth-submit-btn" onclick="login()" type="button">Войти</button><button class="auth-secondary-btn" onclick="showRegister()" type="button">Регистрация</button></div></div>
    <div id="registerModal" class="auth-modal" style="display:none;"><div class="auth-form"><button class="modal-close-btn" onclick="closeRegisterModal()" type="button">✕</button><h3>Регистрация</h3><input type="text" id="regUsername" placeholder="Имя пользователя"><div class="password-container"><input type="password" id="regPassword" placeholder="Пароль"><button type="button" class="toggle-password" data-target="regPassword">👁️</button></div><div class="password-hint">Пароль: не менее 10 символов, только латиница, минимум 1 заглавная буква</div><button class="auth-submit-btn" onclick="register()" type="button">Зарегистрироваться</button><button class="auth-secondary-btn" onclick="hideRegister()" type="button">Назад</button></div></div>
    <div class="notifications-panel" id="notificationsPanel"></div>
    <script src="/static/auth.js"></script>
    <script>
        var currentHistory=[],filteredHistory=[];
        function onAuthStateChanged(a){a?loadHistory():document.getElementById('historyContent').innerHTML='<div class="auth-required"><div class="auth-required-icon">🔒</div><h3>Требуется авторизация</h3><p>Войдите в аккаунт</p><button onclick="showAuthModal()">Войти</button></div>';}
        async function loadHistory(){if(!currentToken)return;try{var r=await fetch(`/api/history?token=${currentToken}`);var h=await r.json();currentHistory=h||[];filteredHistory=[...currentHistory];renderHistory();}catch(e){}}
        function calcStats(h){if(!h||!h.length)return{total:0,unique:0,avg:0};var u=new Set(h.map(x=>x.model_name));var a=h.reduce((s,x)=>s+(x.confidence||0),0)/h.length;return{total:h.length,unique:u.size,avg:Math.round(a*10)/10};}
        function getConfClass(v){return v>=80?'confidence-high':v>=50?'confidence-medium':'confidence-low';}
        function filterHistory(){var s=document.getElementById('searchInput')?.value.toLowerCase()||'';var f=document.getElementById('filterSelect')?.value||'all';filteredHistory=currentHistory.filter(i=>{if(s&&!i.model_name.toLowerCase().includes(s))return false;if(f==='high'&&i.confidence<80)return false;if(f==='medium'&&(i.confidence<50||i.confidence>=80))return false;if(f==='low'&&i.confidence>=50)return false;return true;});renderHistoryTable();}
        function renderHistory(){var c=document.getElementById('historyContent');var s=calcStats(filteredHistory);if(!currentHistory.length){c.innerHTML='<div class="empty-history">📭 История пуста</div>';return;}
        c.innerHTML='<div class="history-stats"><div class="stat-card"><div class="stat-value">'+s.total+'</div><div class="stat-label">Всего</div></div><div class="stat-card"><div class="stat-value">'+s.unique+'</div><div class="stat-label">Уникальных</div></div><div class="stat-card"><div class="stat-value">'+s.avg+'%</div><div class="stat-label">Средняя точность</div></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:15px;"><h3 style="color:#fff;">📋 Список</h3><div><button class="export-btn" onclick="exportHistory()">📥 CSV</button> <button class="clear-btn" onclick="clearHistory()">🗑️ Очистить</button></div></div><div class="filter-section"><input type="text" id="searchInput" class="filter-input" placeholder="🔍 Поиск..." oninput="filterHistory()"><select id="filterSelect" class="filter-select" onchange="filterHistory()"><option value="all">Все</option><option value="high">≥80%</option><option value="medium">50-79%</option><option value="low"><50%</option></select></div><div class="history-table-container"><div id="historyTableWrapper"></div></div>';renderHistoryTable();}
        function renderHistoryTable(){var w=document.getElementById('historyTableWrapper');if(!filteredHistory.length){w.innerHTML='<div class="empty-history">🔍 Ничего не найдено</div>';return;}
        w.innerHTML='<table class="history-table"><thead><tr><th>Фото</th><th>Модель</th><th>Точность</th><th>Дата</th><th></th></tr></thead><tbody>'+filteredHistory.map(i=>{var d=new Date(i.timestamp),cl=getConfClass(i.confidence),thumb=i.image_url||'';return'<tr><td>'+(thumb?'<img src="'+thumb+'" class="history-thumb" onclick="window.open(\''+thumb+'\')" onerror="this.style.display=\'none\'">':'—')+'</td><td class="model-cell">'+escapeHtml(i.model_name)+'</td><td><div style="display:flex;align-items:center;gap:8px;"><span style="color:'+(i.confidence>=80?'#00ff88':i.confidence>=50?'#ffaa00':'#ff4444')+'">'+i.confidence+'%</span><div class="confidence-bar"><div class="confidence-fill '+cl+'" style="width:'+i.confidence+'%;"></div></div></div></td><td>'+d.toLocaleDateString('ru-RU')+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})+'</td><td><button class="action-btn" onclick="searchModel(\''+escapeHtml(i.model_name)+'\')">🔍 Искать</button></td></tr>';}).join('')+'</tbody></table>';}
        function searchModel(n){window.location.href=`/?search=${encodeURIComponent(n)}`;}
        function exportHistory(){if(!filteredHistory.length){showToast('Нет данных','','warning');return;}var csv='Модель,Точность,Дата\n';filteredHistory.forEach(h=>{var d=new Date(h.timestamp);csv+='"'+h.model_name+'",'+h.confidence+',"'+d.toLocaleDateString('ru-RU')+'"\n';});var b=new Blob(['\ufeff'+csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='history.csv';a.click();showToast('Готово','CSV скачан','success');}
        async function clearHistory(){var overlay=document.createElement('div');overlay.className='confirm-overlay';overlay.innerHTML='<div class="confirm-box"><h3>🗑️ Очистить историю</h3><p>Вы уверены?</p><button class="confirm-yes">Да</button><button class="confirm-no">Отмена</button></div>';document.body.appendChild(overlay);overlay.querySelector('.confirm-yes').onclick=async function(){overlay.remove();await fetch(`/api/history/clear?token=${currentToken}`,{method:'DELETE'});loadHistory();};overlay.querySelector('.confirm-no').onclick=function(){overlay.remove();};}
        function escapeHtml(t){if(!t)return'';var d=document.createElement('div');d.textContent=t;return d.innerHTML;}
    </script>
</body>
</html>
